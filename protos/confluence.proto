syntax = "proto3";
package fhiraugury;

import "google/protobuf/timestamp.proto";
import "source_service.proto";

service ConfluenceService {
  rpc GetPageComments(ConfluenceGetCommentsRequest) returns (stream ConfluenceComment);
  rpc GetPageChildren(ConfluenceGetChildrenRequest) returns (stream ConfluencePageSummary);
  rpc GetPageAncestors(ConfluenceGetAncestorsRequest) returns (stream ConfluencePageSummary);
  rpc ListSpaces(ConfluenceListSpacesRequest) returns (stream ConfluenceSpace);
  rpc GetLinkedPages(ConfluenceLinkedPagesRequest) returns (stream ConfluencePageSummary);
  rpc GetPagesByLabel(ConfluenceLabelRequest) returns (stream ConfluencePageSummary);
  rpc GetPageSnapshot(ConfluenceSnapshotRequest) returns (SnapshotResponse);
}

message ConfluencePage {
  int32 id = 1;
  string space_key = 2;
  string title = 3;
  string body_plain = 4;
  string body_storage = 5;
  string labels = 6;
  int32 version_number = 7;
  string last_modified_by = 8;
  google.protobuf.Timestamp last_modified_at = 9;
  string url = 10;
  int32 parent_id = 11;
}

message ConfluenceSpace {
  string key = 1;
  string name = 2;
  string description = 3;
  string url = 4;
  int32 page_count = 5;
}

message ConfluencePageSummary {
  int32 id = 1;
  string space_key = 2;
  string title = 3;
  string url = 4;
  google.protobuf.Timestamp last_modified_at = 5;
}

message ConfluenceComment {
  string id = 1;
  int32 page_id = 2;
  string author = 3;
  string body = 4;
  google.protobuf.Timestamp created_at = 5;
  string url = 6;
}

message ConfluenceGetCommentsRequest {
  int32 page_id = 1;
}

message ConfluenceGetChildrenRequest {
  int32 page_id = 1;
}

message ConfluenceGetAncestorsRequest {
  int32 page_id = 1;
}

message ConfluenceListSpacesRequest {}

message ConfluenceLinkedPagesRequest {
  int32 page_id = 1;
  string direction = 2;
}

message ConfluenceLabelRequest {
  string label = 1;
  string space_key = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ConfluenceSnapshotRequest {
  int32 page_id = 1;
  bool include_comments = 2;
  bool include_internal_refs = 3;
}
